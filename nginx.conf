events {}

http {
    upstream rtbapp {
        server rtb-auction-service:8081;
    }

    server {
        listen 80;

        location /health {
            proxy_pass http://rtbapp/health;
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /auction {
            proxy_pass http://rtbapp/auction;
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /campaigns {
            proxy_pass http://rtbapp/campaigns;
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass http://rtbapp/;
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
