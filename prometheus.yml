global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "rtb-auction-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["rtb-auction-service:8081"]

  - job_name: "redis-exporter"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres-exporter:9187"]
