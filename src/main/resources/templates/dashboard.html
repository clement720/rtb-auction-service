<!DOCTYPE html>
<html>
<head>
    <title>AdTech RTB Dashboard</title>
    <style>
        body { font-family: Arial; background:#020617; color:white; padding:30px; }
        .card { background:#1e293b; padding:20px; border-radius:12px; margin-bottom:20px; }
        .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
        input, select, button { padding:10px; margin:6px; border-radius:6px; border:none; }
        button { background:#22c55e; color:white; font-weight:bold; cursor:pointer; }
        table { width:100%; border-collapse:collapse; background:#1e293b; }
        th, td { padding:10px; border-bottom:1px solid #334155; text-align:left; }
        a { color:#38bdf8; font-weight:bold; }
    </style>
</head>
<body>

<h1>AdTech RTB SRE Dashboard</h1>

<div class="grid">
    <div class="card">
        <h3>RTB Auction Service</h3>
        <p>Status: Running</p>
    </div>
    <div class="card">
        <h3>Prometheus</h3>
        <a href="/actuator/prometheus">Open Metrics</a>
    </div>
    <div class="card">
        <h3>Auction Test</h3>
        <a href="/auction-test">Open Auction Test</a>
    </div>
</div>

<div class="card">
    <h2>Create Campaign</h2>

    <form method="post" action="/campaigns" th:object="${campaign}">
        <input type="text" th:field="*{advertiser}" placeholder="Advertiser e.g. Nike" required />
        <input type="text" th:field="*{targetCountry}" placeholder="Country e.g. US" required />

        <select th:field="*{targetDevice}">
            <option value="CTV">CTV</option>
            <option value="mobile">Mobile</option>
            <option value="desktop">Desktop</option>
        </select>

        <input type="text" th:field="*{targetContentType}" placeholder="Content e.g. live-sports" required />
        <input type="number" step="0.01" th:field="*{maxBid}" placeholder="Max Bid" required />
        <input type="number" step="0.01" th:field="*{dailyBudget}" placeholder="Daily Budget" required />
        <input type="number" step="0.01" th:field="*{spentToday}" placeholder="Spent Today" value="0" />

        <label>
            Active
            <input type="checkbox" th:field="*{active}" />
        </label>

        <button type="submit">Save Campaign</button>
    </form>
</div>

<div class="card">
    <h2>Campaign List</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Advertiser</th>
            <th>Country</th>
            <th>Device</th>
            <th>Content</th>
            <th>Max Bid</th>
            <th>Budget</th>
            <th>Spent</th>
            <th>Active</th>
        </tr>
        <tr th:each="c : ${campaigns}">
            <td th:text="${c.id}"></td>
            <td th:text="${c.advertiser}"></td>
            <td th:text="${c.targetCountry}"></td>
            <td th:text="${c.targetDevice}"></td>
            <td th:text="${c.targetContentType}"></td>
            <td th:text="${c.maxBid}"></td>
            <td th:text="${c.dailyBudget}"></td>
            <td th:text="${c.spentToday}"></td>
            <td th:text="${c.active}"></td>
        </tr>
    </table>
</div>

</body>
</html>
