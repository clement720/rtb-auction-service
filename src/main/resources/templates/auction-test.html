<!DOCTYPE html>
<html>
<head>
    <title>RTB Auction Test</title>
    <style>
        body { font-family: Arial; background:#020617; color:white; padding:30px; }
        .card { background:#1e293b; padding:25px; border-radius:12px; max-width:700px; }
        input, select, button { width:100%; padding:10px; margin:10px 0; border-radius:6px; border:none; }
        button { background:#22c55e; color:white; font-weight:bold; cursor:pointer; }
        pre { background:#0f172a; padding:15px; border-radius:8px; white-space:pre-wrap; }
        a { color:#38bdf8; }
    </style>
</head>
<body>

<h1>RTB Auction Test</h1>

<div class="card">
    <label>Viewer ID</label>
    <input id="viewerId" value="viewer-1001"/>

    <label>Country</label>
    <input id="country" value="US"/>

    <label>Device Type</label>
    <select id="deviceType">
        <option value="CTV">CTV</option>
        <option value="mobile">Mobile</option>
        <option value="desktop">Desktop</option>
    </select>

    <label>Content Type</label>
    <input id="contentType" value="live-sports"/>

    <label>Live Event</label>
    <select id="liveEvent">
        <option value="true">true</option>
        <option value="false">false</option>
    </select>

    <label>Ad Slot</label>
    <select id="adSlot">
        <option value="pre-roll">pre-roll</option>
        <option value="mid-roll">mid-roll</option>
        <option value="post-roll">post-roll</option>
    </select>

    <button onclick="runAuction()">Run Auction</button>

    <h3>Auction Result</h3>
    <pre id="result">Result will appear here...</pre>
</div>

<br>
<a href="/">Back to Dashboard</a>

<script>
async function runAuction() {
    const payload = {
        viewerId: document.getElementById("viewerId").value,
        country: document.getElementById("country").value,
        deviceType: document.getElementById("deviceType").value,
        contentType: document.getElementById("contentType").value,
        liveEvent: document.getElementById("liveEvent").value === "true",
        adSlot: document.getElementById("adSlot").value
    };

    const response = await fetch("/auction", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
    });

    const data = await response.json();
    document.getElementById("result").textContent = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
